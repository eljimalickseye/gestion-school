services:
  mysql:
    image: mysql:8.0
    container_name: gestion_ecole_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: StrongRootPassword123!
      MYSQL_DATABASE: school_db
      MYSQL_USER: utilisateur_apiRest1
      MYSQL_PASSWORD: Security@21
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - gestion_ecole_network
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  app:
    build: .
    container_name: gestion_ecole_app
    restart: unless-stopped
    ports:
      - "8181:8181"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/school_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Africa/Dakar
      SPRING_DATASOURCE_USERNAME: utilisateur_apiRest1
      SPRING_DATASOURCE_PASSWORD: Security@21
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      JWT_EXPIRATION: 1800000
      SERVER_SERVLET_CONTEXT_PATH: /
      BASE_URL_SERVER: http://vps120617.serveur-vps.net:8181
      BASE_URL_LOCAL: localhost:8181
      APP_UPLOAD_DIR: /var/lib/gestion_ecole/data
      TZ: Africa/Dakar
    volumes:
      - app_data:/var/lib/gestion_ecole/data
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - gestion_ecole_network

volumes:
  mysql_data:
  app_data:

networks:
  gestion_ecole_network:
    driver: bridge